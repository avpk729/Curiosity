<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curiosity Wikipedia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js" id="MathJax-script" async></script>
<style>
:root{--bg:#fff;--bg2:#f7f6f3;--bg3:#f0efe9;--text:#1a1a18;--text2:#5a5a56;--text3:#9a9890;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);--accent:#1D9E75;--accent-bg:#E1F5EE;--accent-text:#0a5a40;--radius:10px;--font:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--bg2:#222220;--bg3:#2a2a27;--text:#e8e6de;--text2:#a8a69e;--text3:#6a6860;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--accent-bg:#0a3528;--accent-text:#5ecfa8;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* Sticky Header */
#sticky-header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:0.5px solid var(--border2);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
#article-header{padding:16px 26px 12px;}
#level-tabs{padding:0 26px;}

/* Original styles (kept intact) */
#sidebar{width:272px;min-width:272px;border-right:0.5px solid var(--border2);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden;}
#sidebar-header{padding:14px 14px 8px;border-bottom:0.5px solid var(--border2);}
#sidebar-header h1{font-size:14px;font-weight:600;color:var(--text);}
#sidebar-header p{font-size:11px;color:var(--text3);margin-top:2px;}
#search-box-wrap{padding:8px 12px;border-bottom:0.5px solid var(--border);position:relative;}
#tree-search{width:100%;padding:7px 30px 7px 10px;font-size:13px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
#tree-search:focus{border-color:var(--accent);}
#search-go-btn{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:4px;}
#search-go-btn:hover{color:var(--accent);}
#tree-wrap{flex:1;overflow-y:auto;padding:4px 0 20px;}
.t-subject{display:flex;align-items:center;gap:6px;padding:7px 12px;cursor:pointer;user-select:none;transition:background 0.1s;}
.t-subject:hover,.t-subject.active-subject{background:var(--bg2);}
.t-subject-chev{font-size:9px;color:var(--text3);width:10px;text-align:center;transition:transform 0.15s;flex-shrink:0;display:inline-block;}
.t-subject-chev.open{transform:rotate(90deg);}
.t-subject-icon{font-size:13px;flex-shrink:0;}
.t-subject-label{font-size:13px;font-weight:500;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.t-topic{display:flex;align-items:center;gap:5px;padding:5px 12px 5px 26px;cursor:pointer;transition:background 0.1s;}
.t-topic:hover{background:var(--bg2);}
.t-topic.active{background:var(--accent-bg);}
.t-topic-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.t-topic-dot.visited{background:var(--accent);}
.t-topic-dot.unvisited{background:var(--border2);}
.t-topic-label{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#content{flex:1;overflow-y:auto;padding:22px 26px 80px;max-width:820px;}
.sec-block{margin-bottom:30px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;padding-bottom:8px;border-bottom:0.5px solid var(--border);gap:8px;}
.sec-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.01em;flex:1;}
.simplify-btn{padding:4px 14px;font-size:12px;font-weight:600;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--accent);cursor:pointer;transition:all 0.15s;}
.simplify-btn:hover{background:var(--accent-bg);border-color:var(--accent);}

/* Simplify Modal */
#simplify-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;align-items:center;justify-content:center;}
#simplify-content{background:var(--bg);width:90%;max-width:720px;max-height:85vh;border-radius:12px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.3);}
#simplify-header{padding:18px 24px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
#simplify-body{padding:24px;max-height:65vh;overflow-y:auto;line-height:1.75;font-size:15.5px;}
</style>
</head>
<body>

<div id="selection-popup" onclick="exploreSelection()"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Curiosity Wikipedia</h1>
    <p>Search any topic. Learn it from 5th Grade to PhD.</p>
  </div>
  <div id="search-box-wrap">
    <input id="tree-search" placeholder="Search or explore a topic..." onkeydown="handleSearchKey(event)" oninput="handleSearchInput(this.value)">
    <button id="search-go-btn" onclick="triggerSearch()">→</button>
  </div>
  <div id="tree-wrap"></div>
</div>

<div id="main">
  <!-- Sticky Header -->
  <div id="sticky-header">
    <div id="article-header">
      <div id="article-bc"></div>
      <div id="article-title" style="font-size:26px;font-weight:600;letter-spacing:-0.025em;color:var(--text);line-height:1.2;"></div>
      <div id="article-meta" style="font-size:12px;color:var(--text3);margin-top:4px;"></div>
    </div>
    <div id="level-tabs">
      <button class="level-tab active" id="tab-grade5" onclick="switchLevel('grade5')"><span class="lvl-dot"></span>5th Grade</button>
      <button class="level-tab" id="tab-college" onclick="switchLevel('college')"><span class="lvl-dot"></span>College</button>
      <button class="level-tab" id="tab-masters" onclick="switchLevel('masters')"><span class="lvl-dot"></span>Master's</button>
      <button class="level-tab" id="tab-phd" onclick="switchLevel('phd')"><span class="lvl-dot"></span>PhD</button>
    </div>
  </div>

  <div id="content">
    <div id="empty"><div class="icon">🔭</div><p>Select any topic from the knowledge tree, or search for any academic concept.</p></div>
    <div id="article" style="display:none;">
      <div id="article-body"></div>
      <div id="subtopics-panel" style="display:none;">
        <div id="subtopics-panel-header">
          <h3>Subtopics</h3>
          <div id="subtopics-panel-path"></div>
        </div>
        <div id="subtopics-grid"></div>
      </div>
      <div id="bibliography" style="display:none;">
        <h3>Bibliography</h3>
        <div id="bib-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Simplify Modal -->
<div id="simplify-modal" onclick="if(event.target.id==='simplify-modal')closeSimplify()">
  <div id="simplify-content" onclick="event.stopImmediatePropagation()">
    <div id="simplify-header">
      <div style="font-weight:600;color:var(--accent);">Simplified Explanation</div>
      <button onclick="closeSimplify()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);">×</button>
    </div>
    <div id="simplify-body"></div>
  </div>
</div>

<script>
// === ALL YOUR ORIGINAL JS CODE GOES HERE (KNOWLEDGE_TREE, functions, etc.) ===
// For brevity in this response, paste your full original <script> content from the working version here.
// The critical new parts are below:

// Sticky header + title already handled in HTML

// Simplify function
async function simplifyConcept(heading) {
  const modal = document.getElementById("simplify-modal");
  const body = document.getElementById("simplify-body");
  body.innerHTML = `<p style="text-align:center;color:var(--text3);">Loading simple explanation...</p>`;
  modal.style.display = "flex";

  try {
    const key = cacheKey(currentTopic, currentBranch);
    let data = cache[key] && cache[key]["grade5"];
    if (!data) {
      data = await fetchOneLevel(currentTopic, heading, "grade5", null);
    }
    const sections = parseSections(data.content);
    let html = `<h3 style="margin-bottom:16px;color:var(--accent);">${esc(heading)}</h3>`;
    sections.forEach(s => {
      html += `<p style="margin-bottom:18px;">${s.paragraphs.join('</p><p style="margin-bottom:18px;">')}</p>`;
    });
    body.innerHTML = html;
    typesetMath(body);
  } catch(e) {
    body.innerHTML = `<p style="color:#c00;">Could not load simplification right now. Please try again.</p>`;
  }
}

function closeSimplify() {
  document.getElementById("simplify-modal").style.display = "none";
}

// Updated renderLevel with Simplify button
async function renderLevel(lvl) {
  // ... your existing code to load data ...
  const sections = parseSections(data.content);
  let html = "";
  sections.forEach((s, idx) => {
    html += `<div class="sec-block" data-heading="${esc(s.heading)}">
      <div class="sec-hdr">
        <div class="sec-title">${esc(s.heading)}</div>
        <button class="simplify-btn" onclick="simplifyConcept('${esc(s.heading)}')">Simplify</button>
      </div>
      ${s.paragraphs.map(p => renderParagraph(p, lvl)).join("")}
    </div>`;
    // add images, flowchart, concept map as before
  });
  document.getElementById("article-body").innerHTML = html;
  // ... rest of your render code ...
  typesetMath(document.getElementById("article-body"));
}

// Improved MathJax
function typesetMath(el) {
  if (!el || !window.MathJax) return;
  const doIt = () => {
    window.MathJax.typesetClear([el]);
    window.MathJax.typesetPromise([el]).catch(() => {});
  };
  if (window._mathJaxReady) doIt();
  else setTimeout(doIt, 300);
}

window.MathJax = {
  tex: { inlineMath: [["$","$"]], displayMath: [["$$","$$"]], processEscapes: true },
  startup: { ready() { MathJax.startup.defaultReady(); window._mathJaxReady = true; } }
};

// Paste the rest of your original script (KNOWLEDGE_TREE, renderTree, fetchRepo, navigate, etc.) here
// Make sure the KNOWLEDGE_TREE object and all functions like clickTopic, doExploreAtLevel, etc. are present.
</script>
</body>
</html>
