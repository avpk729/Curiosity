<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curiosity Wikipedia</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js" id="MathJax-script" async></script>
</head>
<body>

<div id="selection-popup" onclick="exploreSelection()"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Curiosity Wikipedia</h1>
    <p>Search any topic. Learn it from 5th Grade to PhD.</p>
  </div>
  <div id="search-box-wrap">
    <input id="tree-search" placeholder="Search or explore a topic..." onkeydown="handleSearchKey(event)" oninput="handleSearchInput(this.value)">
    <button id="search-go-btn" onclick="triggerSearch()">→</button>
  </div>
  <div id="tree-wrap"></div>
</div>

<div id="main">
  <div id="sticky-header">
    <div id="article-header">
      <div id="article-bc"></div>
      <div id="article-title" style="font-size:26px;font-weight:600;letter-spacing:-0.025em;color:var(--text);line-height:1.2;"></div>
      <div id="article-meta" style="font-size:12px;color:var(--text3);margin-top:4px;"></div>
    </div>
    <div id="level-tabs">
      <button class="level-tab active" id="tab-grade5" onclick="switchLevel('grade5')"><span class="lvl-dot"></span>5th Grade</button>
      <button class="level-tab" id="tab-college" onclick="switchLevel('college')"><span class="lvl-dot"></span>College</button>
      <button class="level-tab" id="tab-masters" onclick="switchLevel('masters')"><span class="lvl-dot"></span>Master's</button>
      <button class="level-tab" id="tab-phd" onclick="switchLevel('phd')"><span class="lvl-dot"></span>PhD</button>
    </div>
  </div>

  <div id="content">
    <div id="empty"><div class="icon">🔭</div><p>Select any topic from the knowledge tree, or search for any academic concept.</p></div>
    <div id="article" style="display:none;">
      <div id="article-body"></div>
      <div id="subtopics-panel" style="display:none;">
        <div id="subtopics-panel-header"><h3>Subtopics</h3><div id="subtopics-panel-path"></div></div>
        <div id="subtopics-grid"></div>
      </div>
      <div id="bibliography" style="display:none;">
        <h3>Bibliography</h3>
        <div id="bib-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Simplify Modal -->
<div id="simplify-modal" onclick="if(event.target.id==='simplify-modal')closeSimplify()">
  <div id="simplify-content" onclick="event.stopImmediatePropagation()">
    <div id="simplify-header">
      <div style="font-weight:600;color:var(--accent);">Simplified Explanation</div>
      <button onclick="closeSimplify()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);">×</button>
    </div>
    <div id="simplify-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
