<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curiosity Wikipedia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js" id="MathJax-script" async></script>
<style>
:root{--bg:#fff;--bg2:#f7f6f3;--bg3:#f0efe9;--text:#1a1a18;--text2:#5a5a56;--text3:#9a9890;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);--accent:#1D9E75;--accent-bg:#E1F5EE;--accent-text:#0a5a40;--radius:10px;--font:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--bg2:#222220;--bg3:#2a2a27;--text:#e8e6de;--text2:#a8a69e;--text3:#6a6860;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--accent-bg:#0a3528;--accent-text:#5ecfa8;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* ── STICKY HEADER (your #1 request) ── */
#sticky-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border2);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
#article-header {padding: 16px 26px 12px;}
#level-tabs {padding: 0 26px;}

/* ── Rest of your original styles (unchanged except additions) ── */
#sidebar{width:272px;min-width:272px;border-right:0.5px solid var(--border2);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden;}
/* ... (all your existing CSS remains exactly the same until the new Simplify modal) ... */

#simplify-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.65);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
#simplify-content {
  background: var(--bg);
  width: 90%;
  max-width: 720px;
  max-height: 85vh;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}
#simplify-header {
  padding: 18px 24px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#simplify-body {
  padding: 24px;
  max-height: 65vh;
  overflow-y: auto;
  line-height: 1.75;
  font-size: 15.5px;
}
.simplify-btn {
  padding: 4px 14px;
  font-size: 12px;
  font-weight: 600;
  border-radius: 99px;
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.15s;
}
.simplify-btn:hover {
  background: var(--accent-bg);
  border-color: var(--accent);
}
</style>
</head>
<body>

<!-- Text selection popup (unchanged) -->
<div id="selection-popup" onclick="exploreSelection()"></div>

<div id="sidebar"> ... (your entire sidebar unchanged) ... </div>

<div id="main">
  <!-- NEW STICKY HEADER -->
  <div id="sticky-header">
    <div id="article-header">
      <div id="article-bc"></div>
      <div id="article-title" style="font-size:26px;font-weight:600;letter-spacing:-0.025em;color:var(--text);line-height:1.2;"></div>
      <div id="article-meta" style="font-size:12px;color:var(--text3);margin-top:4px;"></div>
    </div>
    <div id="level-tabs">
      <button class="level-tab active" id="tab-grade5" onclick="switchLevel('grade5')"><span class="lvl-dot"></span>5th Grade</button>
      <button class="level-tab" id="tab-college" onclick="switchLevel('college')"><span class="lvl-dot"></span>College</button>
      <button class="level-tab" id="tab-masters" onclick="switchLevel('masters')"><span class="lvl-dot"></span>Master's</button>
      <button class="level-tab" id="tab-phd" onclick="switchLevel('phd')"><span class="lvl-dot"></span>PhD</button>
    </div>
  </div>

  <div id="content">
    <!-- empty & article divs remain exactly as before -->
    <div id="empty"> ... </div>
    <div id="article">
      <div id="article-body"></div>
      <div id="subtopics-panel"> ... </div>
      <div id="bibliography"> ... </div>
    </div>
  </div>
</div>

<!-- NEW SIMPLIFY MODAL (your #2 request) -->
<div id="simplify-modal" onclick="if(event.target.id==='simplify-modal')closeSimplify()">
  <div id="simplify-content" onclick="event.stopImmediatePropagation()">
    <div id="simplify-header">
      <div style="font-weight:600;color:var(--accent);">Simplified Explanation</div>
      <button onclick="closeSimplify()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);">×</button>
    </div>
    <div id="simplify-body"></div>
  </div>
</div>

<script>
// ── Your original variables and functions stay the same until renderLevel ──

// NEW: Simplify function (replaces Higher/Deeper)
async function simplifyConcept(heading) {
  const modal = document.getElementById("simplify-modal");
  const body = document.getElementById("simplify-body");
  body.innerHTML = `<div style="text-align:center;padding:40px;"><div class="skeleton" style="height:18px;width:60%;margin:0 auto 12px;"></div><div class="skeleton" style="height:13px;width:85%;"></div><div class="skeleton" style="height:13px;width:75%;"></div></div>`;
  modal.style.display = "flex";

  try {
    const key = cacheKey(currentTopic, currentBranch);
    const data = cache[key] && cache[key]["grade5"] 
      ? cache[key]["grade5"] 
      : await fetchOneLevel(currentTopic, heading, "grade5", null); // force simplest level on the exact sub-concept

    const sections = parseSections(data.content);
    let html = `<h3 style="margin-bottom:16px;color:var(--accent);">${heading}</h3>`;
    sections.forEach(s => {
      html += `<p style="margin-bottom:18px;">${s.paragraphs.join("</p><p style='margin-bottom:18px;'>")}</p>`;
    });
    body.innerHTML = html;
    typesetMath(body);
  } catch(e) {
    body.innerHTML = `<p style="color:#c00;">Sorry, couldn't simplify right now. Try again in a moment.</p>`;
  }
}

function closeSimplify() {
  document.getElementById("simplify-modal").style.display = "none";
}

// ── UPDATED renderLevel – removed Higher/Deeper, added Simplify ──
async function renderLevel(lvl){
  const key=cacheKey(currentTopic,currentBranch);
  const data=cache[key]&&cache[key][lvl];if(!data)return;

  document.getElementById("article-bc").innerHTML=currentBranch?`<span>${esc(currentTopic)}</span> &rarr; ${esc(currentBranch)}`:"";
  document.getElementById("article-title").textContent=currentBranch||currentTopic;
  document.getElementById("article-meta").textContent=LEVEL_BUILD[lvl];

  const sections=parseSections(data.content);
  const body=document.getElementById("article-body");
  const imgQuery=currentBranch||currentTopic;
  const imgs=await fetchImages(imgQuery).catch(()=>[]);

  let html="";
  sections.forEach((s,idx)=>{
    html+=`<div class="sec-block" data-heading="${esc(s.heading)}">
      <div class="sec-hdr">
        <div class="sec-title">${esc(s.heading)}</div>
        <button class="simplify-btn" onclick="simplifyConcept('${esc(s.heading)}')">Simplify</button>
      </div>
      ${s.paragraphs.map(p=>renderParagraph(p,lvl)).join("")}
    </div>`;
    if(idx===0&&visPrefs.images&&imgs.length)html+=buildImgStrip(imgs);
    if(idx===1&&visPrefs.flowchart&&data.flowchart)html+=buildFlowchart(data.flowchart,data.flowchartTitle||"Process overview");
    if(idx===2&&visPrefs.conceptmap&&data.conceptMap)html+=buildConceptMap(data.conceptMap,data.conceptMapTitle||"Concept map");
  });

  body.innerHTML=html;
  renderSubtopicsPanel();
  // bibliography unchanged
  const bib=data.bibliography||[];const bl=document.getElementById("bib-list");
  if(bib.length){bl.innerHTML=bib.map(c=>`<div class="cit-item"><span class="cit-num">[${esc(c.ref)}]</span><span class="cit-text">${esc(c.authors)} (${esc(c.year)}). <em>${esc(c.title)}</em>. ${esc(c.source)}.</span></div>`).join("");document.getElementById("bibliography").style.display="block";}
  else document.getElementById("bibliography").style.display="none";

  showArticle(true);
  typesetMath(body);   // ← MathJax call moved here for reliability
}

// ── FIXED MATHJAX (your #5 request) ──
function typesetMath(el){
  if(!el || !window.MathJax) return;
  const doIt = () => {
    el.querySelectorAll(".formula-render[data-latex]").forEach(card => {
      if(!card.dataset.populated){
        card.textContent = "\\[" + card.dataset.latex + "\\]";
        card.dataset.populated = "1";
      }
    });
    el.querySelectorAll(".math-inline[data-tex]").forEach(span => {
      if(!span.dataset.populated){
        span.textContent = "\\(" + span.dataset.tex + "\\)";
        span.dataset.populated = "1";
      }
    });
    window.MathJax.typesetClear([el]);
    window.MathJax.typesetPromise([el]).catch(console.warn);
  };

  if(window._mathJaxReady) doIt();
  else {
    const iv = setInterval(() => {
      if(window._mathJaxReady){ clearInterval(iv); doIt(); }
    }, 80);
  }
}

window.MathJax = {
  tex: { inlineMath: [["$","$"]], displayMath: [["$$","$$"]], processEscapes: true },
  options: { skipHtmlTags: ["script","noscript","style","textarea","pre"] },
  startup: { ready(){ MathJax.startup.defaultReady(); window._mathJaxReady = true; } }
};

// Your existing renderTree, fetchRepo, navigate, etc. remain 100% unchanged
</script>
</body>
</html>
